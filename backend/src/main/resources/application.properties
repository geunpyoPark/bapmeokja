# 1. Database 연결 설정 (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# localhost:3306 뒤에 'bapmeokja'는 본인이 만든 DB 이름으로 바꾸세요
spring.datasource.url=jdbc:mysql://localhost:3306/bapmeokja?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=1234

# 2. JPA/Hibernate 설정 (DB 테이블 자동 생성 및 쿼리 확인)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true